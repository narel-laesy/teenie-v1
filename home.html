<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TEENIE Home</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0a0a0f;
      color: white;
    }

    /* Top Bar */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
      background: #111;
    }

    .logo {
      color: #a855f7;
      font-weight: bold;
      font-size: 18px;
    }

    /* Banner */
    .banner {
      padding: 30px;
      text-align: center;
      background: linear-gradient(90deg, #1a1a2e, #2a0a3d);
    }

    .banner h1 {
      margin: 0;
      font-size: 24px;
    }

    .banner button {
      margin-top: 10px;
      padding: 8px 15px;
      background: #a855f7;
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }

    /* Feed */
    .feed {
      padding: 20px;
    }

    .video {
      background: #1a1a1a;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 8px;
    }

    /* Create Button */
    .create-btn {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 60px;
      background: #a855f7;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 30px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <!-- Top Bar -->
  <div class="topbar">
    <div class="logo">TEENIE</div>
    <div>🔔 💬 👤</div>
  </div>

  <!-- Banner -->
  <div class="banner">
    <h1>Solve. Create. Impact.</h1>
    <p>Join teens solving real-world challenges</p>
    <button>Join Challenge</button>
  </div>

  <!-- Feed -->
  <div class="feed">
    <div class="video">🎥 Climate change idea</div>
    <div class="video">🎥 Coding a robot 🤖</div>
    <div class="video">🎥 Art inspiration 🎨</div>
  </div>

  <!-- Create Button -->
  <div class="create-btn" onclick="createPost()">+</div>

  <script>
    function createPost() {
      alert("Create feature coming soon 🚀");
    }
  </script>

</body>
</html>
