<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>TEENIE Login</title>

<link rel="stylesheet" href="style.css">

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<div class="bg-orb left-orb"></div>
<div class="bg-orb right-orb"></div>

<div class="login-card">

    <div class="corner-dots top-dots"></div>
    <div class="corner-dots bottom-dots"></div>

    <div class="logo-container">

        <div class="logo-ring"></div>

        <div class="logo-symbol">
            T✦
        </div>

    </div>

    <h1 class="brand">
        TEENIE
    </h1>

    <p class="tagline">
        LEARN. GROW.
        <span>SHINE.</span>
    </p>

    <h2>
        Welcome Back
    </h2>

    <p class="subtitle">
        Sign in to continue your journey
    </p>

    <form>

        <div class="input-box">

            <i class="fa-regular fa-user"></i>

            <input
            type="text"
            placeholder="Username">

        </div>


        <div class="input-box">

            <i class="fa-solid fa-lock"></i>

            <input
            type="password"
            id="password"
            placeholder="Password">

            <button
            type="button"
            id="togglePassword">

                <i class="fa-regular fa-eye"></i>

            </button>

        </div>


        <div class="options">

            <label>

                <input type="checkbox">

                Remember me

            </label>

            <a href="#">
                Forgot password?
            </a>

        </div>


        <button
        class="signin-btn">

            SIGN IN

        </button>


        <div class="divider">

            <span></span>

            OR

            <span></span>

        </div>


        <button
        class="google-btn"
        type="button">

            <img
            src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">

            Continue with Google

        </button>


        <p class="signup">

            Don't have an account?

            <a href="#">
                Sign up
            </a>

        </p>

    </form>

</div>

<script src="script.js"></script>

</body>
</html>
