<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>TEENIE Login</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

    <!-- Background Planets -->
    <div class="planet planet-left"></div>
    <div class="planet planet-right"></div>

    <!-- Decorative Dots -->
    <div class="dots dots-top"></div>
    <div class="dots dots-bottom"></div>

    <!-- Main Container -->
    <div class="login-container">

        <!-- Left Circuit -->
        <div class="circuit-left"></div>

        <!-- Right Circuit -->
        <div class="circuit-right"></div>


        <!-- LOGO SECTION -->

        <div class="logo-section">

            <div class="logo-glow"></div>

            <!-- Put your logo image here -->
            <img src="images/teenie-logo.png"
                 class="teenie-logo"
                 alt="TEENIE Logo">

            <!-- If you don't have the image yet,
                 temporarily use this:

            <div class="temp-logo">T✦</div>

            -->

        </div>


        <h1 class="brand-name">
            TEENIE
        </h1>

        <p class="brand-tagline">
            LEARN. GROW.
            <span>SHINE.</span>
        </p>


        <!-- WELCOME -->

        <h2 class="welcome-title">
            Welcome Back
        </h2>

        <p class="welcome-subtitle">
            Sign in to continue your journey
        </p>


        <!-- FORM -->

        <form id="loginForm">

            <!-- USERNAME -->

            <div class="input-box">

                <i class="fa-regular fa-user"></i>

                <input
                    type="text"
                    placeholder="Username"
                    required>

            </div>


            <!-- PASSWORD -->

            <div class="input-box">

                <i class="fa-solid fa-lock"></i>

                <input
                    type="password"
                    id="password"
                    placeholder="Password"
                    required>

                <button
                    type="button"
                    id="togglePassword">

                    <i class="fa-regular fa-eye"></i>

                </button>

            </div>


            <!-- OPTIONS -->

            <div class="options">

                <label>

                    <input type="checkbox">

                    Remember me

                </label>

                <a href="#">
                    Forgot password?
                </a>

            </div>


            <!-- SIGN IN -->

            <button
                class="signin-btn"
                type="submit">

                SIGN IN

            </button>


            <!-- DIVIDER -->

            <div class="divider">

                <span></span>

                <p>OR</p>

                <span></span>

            </div>


            <!-- GOOGLE -->

            <button
                type="button"
                class="google-btn">

                <img
                    src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
                    alt="Google">

                Continue with Google

            </button>


            <!-- SIGN UP -->

            <p class="signup-text">

                Don't have an account?

                <a href="#">
                    Sign up
                </a>

            </p>

        </form>

    </div>


    <script src="script.js"></script>

</body>

</html>
