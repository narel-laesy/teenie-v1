<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TEENIE</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0a0a0f;
      color: white;
    }

    /* Top Bar */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      background: #111;
      border-bottom: 1px solid #222;
    }

    .logo {
      font-size: 22px;
      font-weight: bold;
      color: #a855f7;
    }

    .icons span {
      margin-left: 15px;
      cursor: pointer;
    }

    /* Banner */
    .banner {
      padding: 40px;
      background: linear-gradient(90deg, #1a1a2e, #2a0a3d);
      text-align: center;
    }

    .banner h1 {
      margin: 0;
      font-size: 28px;
    }

    .banner button {
      margin-top: 15px;
      padding: 10px 20px;
      background: #a855f7;
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }

    /* Feed */
    .feed {
      padding: 20px;
    }

    .video {
      background: #1a1a1a;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
    }

    /* Create Button */
    .create-btn {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #a855f7;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 30px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <!-- Top Bar -->
  <div class="topbar">
    <div class="logo">T TEENIE</div>
    <div class="icons">
      <span>🔔</span>
      <span>💬</span>
      <span>👤</span>
    </div>
  </div>

  <!-- Banner -->
  <div class="banner">
    <h1>Solve. Create. Impact.</h1>
    <p>Join teens solving real-world challenges</p>
    <button>Join Challenge</button>
  </div>

  <!-- Feed -->
  <div class="feed">
    <div class="video">🎥 My first idea on climate change</div>
    <div class="video">🎥 Building a simple robot 🤖</div>
    <div class="video">🎥 Art that inspires 🎨</div>
  </div>

  <!-- Create Button -->
  <div class="create-btn">+</div>

</body>
</html>
