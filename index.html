<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEENIE | Login</title>

    <!-- Google Font -->
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    >

    <!-- Icons -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    >

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Animated Background -->
    <div class="background-glow glow-1"></div>
    <div class="background-glow glow-2"></div>

    <!-- Floating Particles -->
    <div id="particles"></div>

    <!-- Login Card -->
    <div class="login-card">

        <!-- Neon Edge Effects -->
        <div class="left-wave"></div>
        <div class="right-wave"></div>

        <!-- Logo -->
        <div class="logo-wrapper">
            <div class="logo-ring"></div>

            <!-- Replace with your logo later -->
            <div class="logo-circle">
                <i class="fa-solid fa-heart"></i>
            </div>
        </div>

        <!-- Brand -->
        <p class="brand-name">TEENIE</p>

        <!-- Heading -->
        <h1>Welcome Back</h1>

        <p class="subtitle">
            Sign in to continue your journey.
        </p>

        <!-- Login Form -->
        <form id="loginForm">

            <!-- Username -->
            <div class="input-group">

                <i class="fa-regular fa-user"></i>

                <input
                    type="text"
                    id="username"
                    placeholder="Username"
                    required
                >

            </div>

            <!-- Password -->
            <div class="input-group">

                <i class="fa-solid fa-lock"></i>

                <input
                    type="password"
                    id="password"
                    placeholder="Password"
                    required
                >

                <button
                    type="button"
                    class="toggle-password"
                    id="togglePassword"
                >
                    <i class="fa-regular fa-eye"></i>
                </button>

            </div>

            <!-- Options -->
            <div class="options">

                <label class="remember-me">

                    <input type="checkbox">

                    <span>Remember me</span>

                </label>

                <a href="#" class="forgot-link">
                    Forgot Password?
                </a>

            </div>

            <!-- Button -->
            <button class="login-btn" type="submit">

                <span>Sign In</span>

                <i class="fa-solid fa-arrow-right"></i>

            </button>

        </form>

        <!-- Footer -->
        <div class="signup-text">

            Don't have an account?

            <a href="#">
                Create One
            </a>

        </div>

    </div>

    <!-- Reflection -->
    <div class="floor-reflection"></div>

    <script src="script.js"></script>

</body>
</html>
